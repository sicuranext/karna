# Karna — production stack (DB-less).
#
# Kong runs in DB-less mode: no Postgres, no migrations. The declarative config
# (kong.yml) is loaded at boot and puts Karna in front of your backend. Redis is
# only used by `rate_limit` rules; the rest of the WAF works without it.
#
# Run from the repo root:
#   1. edit docker/kong.yml -> point the service `url` at your app
#   2. docker compose -f docker/docker-compose.prod.yml up -d --build
#   3. traffic: client -> :8000 (Karna / Kong) -> your app
#
# For the local dev/integration stack (Postgres + echo + live plugin reload)
# use docker-compose.dev.yml instead.

# Explicit project name so volumes/network don't collide with another compose
# project (the file lives under docker/, which would otherwise default to "docker").
name: karna-prod

services:
  redis:
    image: redis:7-alpine
    container_name: karna-redis
    command: redis-server --appendonly yes
    restart: unless-stopped

  karna:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: prod
      args:
        # Stamp the build identity. Export these before `docker compose build`
        # (scripts/build.sh does it), or they default to "unknown".
        KARNA_COMMIT: ${KARNA_COMMIT:-unknown}
        KARNA_BUILD_DATE: ${KARNA_BUILD_DATE:-unknown}
    image: karna:latest
    container_name: karna
    depends_on:
      - redis
    ports:
      - "8000:8000"      # proxy
      - "8443:8443"      # proxy SSL
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: warn
      # KONG_PLUGINS=bundled,karna, the PCRE match-limit and the KARNA_* env
      # whitelist (KONG_NGINX_MAIN_INCLUDE) are baked into the image.

      # Global rules (optional): a Redis-distributed rule pack evaluated on
      # every service, before local + CRS rules. Uncomment both, generate the
      # key with `openssl rand -hex 32`, publish with
      # scripts/karna-rules.py --type global-rules. See docs/rules.html.
      # KARNA_REDIS_URL: redis://redis:6379/0
      # KARNA_GLOBAL_RULES_HMAC_KEY: "<openssl rand -hex 32>"
    volumes:
      - ./kong.yml:/kong/kong.yml:ro
    restart: unless-stopped

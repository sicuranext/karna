# Whitelist env vars that must be visible to nginx worker processes
# (where the karna plugin runs). nginx wipes the env by default;
# anything read via os.getenv() at init_worker time must be declared here.
#
# Included via KONG_NGINX_MAIN_INCLUDE.

env KARNA_CRS_PATH;
env KARNA_LIBINJECTION_SO;
env KARNA_LIBKA_RE2_SO;
env KARNA_PROFILE;

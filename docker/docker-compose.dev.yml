# Karna — local dev / integration-test stack.
#
# Ports are intentionally shifted into the 28xxx / 25432 / 26379 range to
# avoid clashing with other Kong / Postgres / Redis instances on the host.
#
# Run from the repo root:
#   docker compose -f docker/docker-compose.dev.yml up --build
#   curl http://localhost:28001/   # Kong Admin API ready?
# See docker/README.md for the full walkthrough and how to run hurl tests.
#
# This builds the `base` stage of docker/Dockerfile (Kong + libinjection + CRS +
# native scanners) and bind-mounts the plugin source, running `luarocks make` at
# start for live iteration. For production use docker-compose.prod.yml instead.

# Explicit project name: the compose file lives under docker/, so without this
# the project would default to "docker" and its volumes/network ("docker_*")
# would collide with any other compose project named "docker" on the host.
name: karna-dev

services:
  postgres:
    image: postgres:13
    container_name: karna-pg
    environment:
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong
      POSTGRES_DB: kong
    volumes:
      - karna_pg_data:/var/lib/postgresql/data
    ports:
      - "25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong -d kong"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: karna-redis
    hostname: karna-redis
    ports:
      - "26379:6379"
    command: redis-server --appendonly yes
    restart: unless-stopped

  echo:
    # Reflects the incoming request as JSON — perfect upstream for WAF tests.
    image: mendhak/http-https-echo:31
    container_name: karna-echo
    environment:
      HTTP_PORT: 8080
    restart: unless-stopped

  kong:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: base
    image: karna-dev:latest
    container_name: karna-kong
    user: "root"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      echo:
        condition: service_started
    ports:
      - "28000:8000"   # Proxy
      - "28443:8443"   # Proxy SSL
      - "28001:8001"   # Admin API
      - "28002:8002"   # Kong Manager
      - "28444:8444"   # Admin API SSL
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PG_DATABASE: kong

      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: warn

      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
      # Kong Manager runs in the browser on the host, so it must reach the
      # Admin API at the host-mapped port (28001), not the in-container 8001.
      KONG_ADMIN_GUI_API_URL: http://localhost:28001

      KONG_PLUGINS: bundled,karna

      # Whitelist KARNA_CRS_PATH for nginx worker processes.
      KONG_NGINX_MAIN_INCLUDE: /etc/kong/nginx/main-env.conf

      # Cap PCRE backtracking iterations per ngx.re.match call. Without this
      # a catastrophic-backtracking regex (some CRS rules have them) can pin
      # a worker indefinitely. 100_000 is the goldilocks number on the bench:
      # raising it to 1_000_000 enabled 934100/34 (a CVE-2025-55182 payload
      # with a 1.5 KB Node.js attack regex) but caused ~10× p99 latency
      # regressions on benign random-args and multipart payloads in the
      # k6 bench. The trade-off favours throughput on legitimate traffic;
      # 934100/34 is tagged as an architectural residual instead.
      # Pathological patterns hit the cap and return nil + err. Karna's
      # `safe_re_match` wrapper turns the error into a fail-closed
      # no-match for negation operators (avoids FP) and a regular
      # no-match for positive operators.
      KONG_NGINX_HTTP_LUA_REGEX_MATCH_LIMIT: "100000"

      # Override CRS rules path (default in the image is /opt/coreruleset/rules/).
      KARNA_CRS_PATH: /opt/coreruleset/rules/

    volumes:
      # Plugin source — read-only. luarocks make at startup installs from here.
      - ../kong:/usr/local/kong/custom-plugins/karna/kong:ro
      # RE2 spike: C source compiled to libka_re2.so at start (memory karna-re2-spike).
      - ../src:/usr/local/kong/custom-plugins/karna/src:ro
      - ../tests:/usr/local/kong/custom-plugins/karna/tests:ro
      - ../kong-plugin-karna-1.0.0-0.rockspec:/usr/local/kong/custom-plugins/karna/kong-plugin-karna-1.0.0-0.rockspec:ro
      - ./main-env.conf:/etc/kong/nginx/main-env.conf:ro

    command: >
      sh -c "
      cd /usr/local/kong/custom-plugins/karna/ &&
      luarocks make &&
      ( g++ -shared -fPIC -O2 -std=c++17 -o /usr/local/lib/libka_re2.so src/libka_re2/ka_re2.cc -lre2 && ldconfig || echo 'libka_re2 build failed (engine_re2_scan falls back to Lua)' ) &&
      ( gcc -shared -fPIC -O2 -o /usr/local/lib/libka_ac.so src/libka_ac/ka_ac.c && ldconfig || echo 'libka_ac build failed (engine_ac_pm falls back to Lua)' ) &&
      kong migrations bootstrap &&
      kong migrations up &&
      kong migrations finish &&
      kong start --vv
      "
    restart: unless-stopped

volumes:
  # Isolated, project-scoped Postgres volume (karna-dev_karna_pg_data) so the
  # dev DB never collides with another compose project's postgres volume.
  karna_pg_data:
